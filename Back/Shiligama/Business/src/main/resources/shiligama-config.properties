# =====================================================================
# Configuración de la capa de negocio (Business)
# Leída por pe.edu.pucp.config.Config
# =====================================================================

# ---------------------------------------------------------------------
# Pasarela de pago Izipay — API REST V4 (formulario embebido / formToken)
# Credenciales del Back Office del comercio (sección "Claves de API REST").
# ---------------------------------------------------------------------
# Endpoint de creación de pago (devuelve answer.formToken).
izipay.endpoint=https://api.micuentaweb.pe/api-payment/V4/Charge/CreatePayment
# Base del SDK JavaScript (Krypton) — DISTINTA del endpoint de API.
# Referencia: Back Office → Claves de API REST → "URL JavaScript"
izipay.js.base=https://static.micuentaweb.pe
# USERNAME / identificador de tienda (no es secreto).
izipay.username=60223135
# PASSWORD de TEST (clave de API REST). SECRETO — usado también para firmar el IPN.
izipay.password=testpassword_TnylzpGYv70i1Lgxy2m07HvjWIS5x50uZNBCsBAnpRgQP
# PUBLIC_KEY de TEST (clave pública para el SDK del navegador).
izipay.public.key=60223135:testpublickey_AHYWjklAhhbkuiH0gRwmFVn8nVSa0ITQ78MpsbENn1RhU
# Clave HMAC-SHA-256 de TEST (valida la firma del resultado en el navegador).
izipay.hmac.key=1GRTnkeTmFLDwEmtNqW7eLagrTtCLFkAot3w2oqwvcHgN
# Modo: TEST o PRODUCTION.
izipay.mode=TEST
izipay.language=es-ES
# Moneda por defecto.
izipay.currency=PEN
# Demo mode: si es true y CreatePayment falla (ej: cuenta no validada aún),
# el backend retorna el token especial "DEMO" y el front muestra un formulario simulado.
# Cambiar a false cuando la cuenta Izipay esté aprobada en producción.
izipay.demo=true

# ---------------------------------------------------------------------
