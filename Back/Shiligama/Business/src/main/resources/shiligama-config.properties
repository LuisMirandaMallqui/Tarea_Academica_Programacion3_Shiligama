# =====================================================================
# Configuración de la capa de negocio (Business)
# Leída por pe.edu.pucp.config.Config (también se puede sobreescribir
# con variables de entorno, p.ej. IZIPAY_MERCHANT_KEY en la EC2).
#
# IMPORTANTE: completa los valores marcados como TODO antes de usar la
# pasarela o el correo en un entorno real. No subas las claves reales a git.
# =====================================================================

# ---------------------------------------------------------------------
# Pasarela de pago Izipay (modo pruebas)
# ---------------------------------------------------------------------
# Endpoint que crea el pago y devuelve { "redirectionUrl": "..." }.
# Puede ser el túnel/microservicio intermediario (como en Compu-Rangers)
# o el endpoint de creación de formulario de Izipay.
izipay.create.payment.url=TODO_URL_CREACION_PAGO_IZIPAY
# Cabecera Authorization si el endpoint la requiere (Basic ...), opcional.
izipay.auth.header=
# Identificador de tienda (shopId) de Izipay.
izipay.shop.id=TODO_SHOP_ID
# Clave secreta del comercio para validar la firma HMAC del callback (IPN).
izipay.merchant.key=TODO_CLAVE_HMAC_IZIPAY
# Modo: TEST o PRODUCTION.
izipay.mode=TEST
izipay.language=es-ES
# URL de retorno tras el pago (pantalla de resultado del frontend Blazor).
# Ajusta el host/puerto al de tu app Blazor (dev: http://localhost:5273).
izipay.return.url=http://localhost:5273/checkout/resultado

# ---------------------------------------------------------------------
# Correo SMTP (recuperación de contraseña) — estilo SanchezLovers
# Usa una contraseña de aplicación (App Password) de Gmail, NO la del correo.
# ---------------------------------------------------------------------
correo.emailOrigen=TODO_micorreo@gmail.com
correo.password=TODO_APP_PASSWORD_GMAIL
correo.smtp.host=smtp.gmail.com
correo.smtp.port=587
# Minutos de validez del enlace de recuperación.
correo.token.minutos=60

# ---------------------------------------------------------------------
# Frontend (para construir el enlace del correo de recuperación)
# ---------------------------------------------------------------------
app.frontend.url=http://localhost:5273
