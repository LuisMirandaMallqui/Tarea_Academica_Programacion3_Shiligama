# ---------------------------------------------------------------------
# IMPORTANTE: emailOrigen y password deben ser del mismo Google Account.
# La App Password se genera en: myaccount.google.com → Seguridad → Contraseñas de aplicaciones
# (requiere 2-Step Verification activo en esa cuenta)
correo.emailOrigen=luismiranda20004@gmail.com
correo.password=hwhnvguonakqbdbs
correo.smtp.host=smtp.gmail.com
correo.smtp.port=587
# Minutos de validez del enlace de recuperación.
correo.token.minutos=60

# ---------------------------------------------------------------------
# Frontend (para construir el enlace del correo de recuperación)
# ---------------------------------------------------------------------
app.frontend.url=http://localhost:5273

# Cliente por defecto para ventas presenciales (POS) sin identificación — USUARIO_ID=9
pos.cliente.default.id=9

